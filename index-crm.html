<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <title>Azcend Pagamentos</title>

    <!-- REDIRECIONAMENTO IMEDIATO (funciona mesmo que o CRM bloqueie scripts) -->
    <meta http-equiv="refresh" content="0; url=https://magodogpt.github.io/azcend-website/">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
        }

        .logo {
            width: 80px;
            height: 80px;
            animation: pulse 1.4s ease-in-out infinite;
        }

        .bar-track {
            width: 160px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 99px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b7ff, #009ad6);
            border-radius: 99px;
            animation: load 1.2s ease-in-out forwards;
        }

        .label {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            letter-spacing: 0.04em;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(0.95); }
            50%       { opacity: 1;   transform: scale(1.05); }
        }

        @keyframes load {
            0%   { width: 0%; }
            80%  { width: 90%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="splash">
        <img class="logo"
             src="https://magodogpt.github.io/azcend-website/assets/images/8GI50WmomsRP96cEptfiIAF0GQ0_1d09167d423c.png"
             alt="Azcend" />

        <div class="bar-track">
            <div class="bar-fill"></div>
        </div>

        <span class="label">Carregando...</span>
    </div>

    <script>
        window.location.replace('https://magodogpt.github.io/azcend-website/');
    </script>

</body>
</html>
